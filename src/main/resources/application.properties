# ============================
# Cloudinary
# ============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# O dialect é configurado automaticamente pelo DatabaseConfig baseado no DB_URL
# Não definir aqui para evitar conflito

# Desabilitar data.sql
spring.sql.init.mode=never

# ============================
# JWT Configuration
# ============================
jwt.secret=${JWT_SECRET:inkflow-secret-key-change-in-production}
jwt.expiration=86400000

# ============================
# Server Configuration
# ============================
server.port=${PORT:8080}

# ============================
# Logging
# ============================
logging.level.org.springframework.web=INFO
logging.level.com.backend.INKFLOW=DEBUG

# ============================
# Connection Pool (Hikari)
# ============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
