# ============================
# Groq AI
# ============================
groq.api.key=${GROQ_API_KEY}

# ============================
# Upload
# ============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================
# Cloudinary
# ============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# O dialect é configurado automaticamente pelo DatabaseConfig baseado no DB_URL
# Não definir aqui para evitar conflito

# Desabilitar data.sql
spring.sql.init.mode=never

# ============================
# JWT Configuration
# ============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ============================
# Backup
# ============================
backup.webhook.url=${BACKUP_WEBHOOK_URL:}

# ============================
# E-mail SMTP (Gmail)
# ============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USER}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.debug=false

# ============================
# Landing Page
# ============================
landing.default.client.password=${DEFAULT_CLIENT_PASS}

# ============================
# Server Configuration
# ============================
server.port=${PORT:8080}

# ============================
# Jackson
# ============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================
# Error handling
# ============================
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-exception=false
server.error.include-stacktrace=never

# ============================
# Logging
# ============================
logging.level.org.springframework.web=INFO
logging.level.com.backend.INKFLOW=INFO
logging.level.org.springframework.transaction=WARN
logging.level.org.hibernate.SQL=INFO

# ============================
# Connection Pool (Hikari)
# ============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
